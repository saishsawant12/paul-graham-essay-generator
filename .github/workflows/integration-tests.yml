name: Integration Tests

on:
  push:
  pull_request:

jobs:
  integration-tests:
    name: Run integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('paul-graham-generator/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache HuggingFace & model files
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
            ~/.cache/huggingface/hub
          key: ${{ runner.os }}-hf-models-${{ hashFiles('paul-graham-generator/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-hf-models-

      - name: Install dependencies
        run: |
          python -m pip install -r paul-graham-generator/requirements.txt

      - name: Build FAISS index (if missing)
        run: |
          if [ ! -f paul-graham-generator/pg_index.faiss ]; then
            python paul-graham-generator/embeddings.py --csv paul-graham-generator/cleaned_essays.csv --index paul-graham-generator/pg_index.faiss --meta paul-graham-generator/embeddings_meta.json --model all-MiniLM-L6-v2
          else
            echo "FAISS index already present, skipping build."
          fi

      - name: Run integration tests
        run: |
          cd paul-graham-generator
          python -m runpy run_path tests/integration_test.py

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: paul-graham-generator/test_results.txt
